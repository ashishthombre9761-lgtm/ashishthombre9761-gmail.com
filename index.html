<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Letter - Shivleela</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Letter Envelope Animation -->
        <div id="envelopeSection" class="envelope-section">
            <div class="envelope">
                <div class="envelope-front">
                    <div class="envelope-flap"></div>
                    <div class="envelope-body"></div>
                    <p class="envelope-text">Open Your Letter</p>
                </div>
            </div>
            <button id="openBtn" class="btn-open">Click to Open</button>
        </div>

        <!-- Letter Content -->
        <div id="letterContent" class="letter-content hidden">
            <div class="letter-wrapper">
                <button id="backBtn" class="btn-back">← Back</button>

                <div class="letter-header">
                    <h1>✉️ Your Letter</h1>
                </div>

                <div class="letter-body">
                    <!-- Sender Name -->
                    <div class="letter-section">
                        <h2>From:</h2>
                        <p id="senderName" class="sender-name"></p>
                    </div>

                    <!-- Message -->
                    <div class="letter-section">
                        <h2>Message:</h2>
                        <div id="messageContent" class="message-content"></div>
                    </div>

                    <!-- Photo -->
                    <div id="photoSection" class="letter-section hidden">
                        <h2>📷 Photo:</h2>
                        <div id="photoDisplay" class="photo-display"></div>
                    </div>

                    <!-- Audio -->
                    <div id="audioSection" class="letter-section hidden">
                        <h2>🎵 Audio:</h2>
                        <div id="audioDisplay" class="audio-display"></div>
                    </div>

                    <!-- Metadata -->
                    <div class="letter-section">
                        <p class="letter-date" id="letterDate"></p>
                    </div>
                </div>

                <div class="letter-footer">
                    <button id="downloadBtn" class="btn-download">📥 Download Letter</button>
                    <button id="shareBtn" class="btn-share">📤 Share</button>
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <div id="errorSection" class="error-section hidden">
            <div class="error-box">
                <h2>❌ Letter Not Found</h2>
                <p>The letter you're looking for doesn't exist or has been removed.</p>
                <button id="goHomeBtn" class="btn-home">← Go Back</button>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loadingSection" class="loading-section">
            <div class="spinner"></div>
            <p>Loading your letter...</p>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
